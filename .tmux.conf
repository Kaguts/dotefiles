# Préfixe : Ctrl+a (plus accessible que Ctrl+b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Souris activée (redimensionner/sélectionner les panes)
set -g mouse on

# Mode vi pour la copie (Espace pour sélectionner, Entrée pour copier)
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Numérotation des fenêtres/panes à partir de 1
set -g base-index 1
setw -g pane-base-index 1

# Garde les index contigus quand on ferme une fenêtre
set -g renumber-windows on

# Découpe de panes plus intuitive
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Recharger la config avec <prefix> r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf rechargé"

# Historique de scroll plus long
set -g history-limit 10000

# Délai de répétition plus court (utile pour le redimensionnement rapide)
set -g repeat-time 300

# Barre de statut : hostname, date/heure
set -g status-style bg=black,fg=white
set -g status-left "#[bold]#h "
set -g status-right "%Y-%m-%d %H:%M"
set -g status-interval 5

# Active le support des couleurs étendues (utile avec Starship/WezTerm)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
