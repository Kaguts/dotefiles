# Config Starship — prompt orienté DevOps/sécu.
# Doc complète : https://starship.rs/config/
# Chargé via le plugin "starship" de sheldon/plugins.toml.

"$schema" = 'https://starship.rs/config-schema.json'

# Prompt sur deux lignes : contexte en haut, ligne de saisie propre en bas
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$docker_context\
$kubernetes\
$aws\
$terraform\
$python\
$cmd_duration
$character"""

add_newline = true

# Symbole de saisie ➜ : vert si la dernière commande a réussi, rouge sinon
[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"

# Répertoire courant, tronqué aux 4 derniers dossiers (ou à la racine du repo git)
[directory]
truncation_length = 4
truncate_to_repo = true
style = "bold cyan"

# Toujours affiché : utilisateur courant
[username]
show_always = true
style_user = "bold yellow"
style_root = "bold red"
format = "[$user]($style)@"

# Toujours affiché : nom de la machine
[hostname]
ssh_only = false
style = "bold green"
format = "[$hostname]($style) "

# --- Git ---

# Branche courante
[git_branch]
symbol = " "
style = "bold purple"
format = "on [$symbol$branch]($style) "

# État du repo : fichiers modifiés/ajoutés/supprimés + commits en avance/retard
[git_status]
style = "bold red"
format = '([$all_status$ahead_behind]($style)) '

# --- Conteneurs / Infra ---

# Affiché seulement si un fichier Docker est présent dans le dossier
# (docker-compose.yml, Dockerfile...)
[docker_context]
symbol = " "
style = "blue bold"
format = "via [$symbol$context]($style) "
only_with_files = true

# Contexte + namespace kubectl courant (très utile pour éviter de bosser
# sur le mauvais cluster en pentest/admin)
[kubernetes]
disabled = false
symbol = "☸ "
style = "bold cyan"
format = '[$symbol$context( \($namespace\))]($style) '

# Profil + région AWS actifs (variables AWS_PROFILE / AWS_REGION,
# ou config dans ~/.aws/config)
[aws]
symbol = "  "
style = "bold orange"
format = 'on [$symbol($profile )($region )]($style)'

# Workspace Terraform courant
[terraform]
symbol = "💠 "
style = "bold 105"
format = "via [$symbol$workspace]($style) "

# --- Dev ---

# Version Python + environnement virtuel actif
[python]
symbol = " "
style = "bold yellow"
format = 'via [$symbol$pyenv_prefix($version )(\($virtualenv\) )]($style)'

# --- Divers ---

# Affiche la durée d'exécution si la commande précédente a pris plus de 2s
[cmd_duration]
min_time = 2000
style = "bold yellow"
format = "took [$duration]($style)"

# Heure désactivée (décommente disabled = false pour l'activer)
[time]
disabled = true
